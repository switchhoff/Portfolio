<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop SVG Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e14; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
  svg { max-width: 100vw; max-height: 100vh; }
  .hotspot { cursor: pointer; transition: opacity 0.2s; }
  .hotspot:hover { opacity: 0.85; }
  .tooltip { pointer-events: none; }
  #label {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
    color: #00d4ff; padding: 6px 16px; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; display: none; border-radius: 2px;
  }
</style>
</head>
<body>
<div id="label"></div>
<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Brick pattern for left wall -->
  <pattern id="bricks" x="0" y="0" width="24" height="12" patternUnits="userSpaceOnUse">
    <rect width="24" height="12" fill="#5a2a1a"/>
    <rect x="0" y="0" width="22" height="10" fill="#7a3820" rx="0.5"/>
    <rect x="12" y="6" width="22" height="10" fill="#7a3820" rx="0.5"/>
    <rect x="-12" y="6" width="22" height="10" fill="#7a3820" rx="0.5"/>
  </pattern>
  <!-- Rug chevron pattern -->
  <pattern id="rug" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="20" height="20" fill="#2a4438"/>
    <polyline points="0,10 5,5 10,10 15,5 20,10" fill="none" stroke="#3a5a4a" stroke-width="1.5"/>
    <polyline points="0,20 5,15 10,20 15,15 20,20" fill="none" stroke="#3a5a4a" stroke-width="1.5"/>
  </pattern>
  <!-- Multiboard tile — octagon shape in a cell -->
  <symbol id="mb-tile" viewBox="0 0 18 18">
    <rect width="18" height="18" fill="#1a2a3a"/>
    <!-- Octagon hole -->
    <polygon points="5,1 13,1 17,5 17,13 13,17 5,17 1,13 1,5" fill="#2a1810" stroke="#151f28" stroke-width="0.5"/>
    <!-- Inner ring -->
    <polygon points="6,3 12,3 15,6 15,12 12,15 6,15 3,12 3,6" fill="#1e100a" stroke="#2a1810" stroke-width="0.3"/>
  </symbol>
</defs>

<!-- ═══════════════════════════════════════════════ -->
<!-- ISOMETRIC ROOM                                  -->
<!-- ═══════════════════════════════════════════════ -->

<!-- FLOOR — green chevron rug -->
<polygon points="450,520 100,360 100,640 450,700 800,640 800,360" fill="url(#rug)" opacity="0.9"/>
<!-- Floor base tone -->
<polygon points="450,520 100,360 450,400 800,360" fill="#1a2820" opacity="0.5"/>
<!-- Floor edge highlight -->
<polyline points="100,640 450,700 800,640" fill="none" stroke="#2a3a30" stroke-width="1"/>

<!-- LEFT WALL — brick -->
<polygon points="100,80 100,640 450,700 450,120" fill="url(#bricks)" opacity="0.85"/>
<!-- Left wall shade overlay -->
<polygon points="100,80 100,640 450,700 450,120" fill="#000" opacity="0.35"/>
<!-- Left wall edge -->
<line x1="100" y1="80" x2="100" y2="640" stroke="#3a2010" stroke-width="1.5"/>

<!-- BACK WALL — dark, will hold multiboard -->
<polygon points="450,80 450,520 800,360 800,40" fill="#0f1820"/>
<!-- Back wall edge highlight top -->
<line x1="450" y1="80" x2="800" y2="40" stroke="#243850" stroke-width="1"/>

<!-- CEILING -->
<polygon points="100,80 450,40 800,40 450,80" fill="#0d1520" opacity="0.9"/>
<line x1="100" y1="80" x2="450" y2="40" stroke="#1a2a3a" stroke-width="1"/>
<line x1="450" y1="40" x2="800" y2="40" stroke="#1a2a3a" stroke-width="1"/>
<!-- Ceiling strip light (fluorescent tube) -->
<line x1="380" y1="58" x2="600" y2="48" stroke="#fffdf0" stroke-width="3" opacity="0.6"/>
<line x1="380" y1="58" x2="600" y2="48" stroke="#fffdf0" stroke-width="8" opacity="0.08"/>

<!-- Room corner edges -->
<line x1="450" y1="80" x2="450" y2="520" stroke="#1a2a3a" stroke-width="1.5"/>
<line x1="450" y1="520" x2="100" y2="360" stroke="#1a2a3a" stroke-width="1"/>
<line x1="450" y1="520" x2="800" y2="360" stroke="#1a2a3a" stroke-width="1"/>

<!-- MULTIBOARD WALL (11×11 grid on back wall)       -->

  <g transform="skewY(-6) translate(490, 95)">
    <!-- Panel background -->
    <rect x="0" y="0" width="265" height="310" fill="#162030" stroke="#0a1520" stroke-width="2" rx="1"/>

    <!-- 11×11 grid of multiboard tiles -->

  </g>
</g>

<script>
  const label = document.getElementById('label');
  document.querySelectorAll('.hotspot').forEach(el => {
    el.addEventListener('mouseenter', () => {
      label.textContent = el.dataset.label || '';
      label.style.display = 'block';
    });
    el.addEventListener('mouseleave', () => {
      label.style.display = 'none';
    });
  });
</script>
